<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ronin Flashcard Studio v2</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080d1a">
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root { --bg: #080d1a; --indigo: #6366f1; }
    body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #e2e8f0; -webkit-tap-highlight-color: transparent; }
    .hindi-text { font-family: 'Noto Sans Devanagari', sans-serif; }
    
    .card-container { perspective: 1500px; height: 440px; width: 100%; max-width: 400px; margin: 0 auto; }
    .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; position: relative; height: 100%; width: 100%; cursor: pointer; }
    .is-flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 24px; padding: 32px; display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.1); background: linear-gradient(145deg, #111827, #080d1a); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .card-back { transform: rotateY(180deg); background: #0f172a; border: 1px solid var(--indigo); }
    
    .btn-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    .drop-zone { border: 2px dashed rgba(99, 102, 241, 0.3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SubjectIcon = ({ subject }) => {
      const s = (subject || "").toLowerCase();
      const map = {
        hindi: <span className="text-2xl font-bold hindi-text text-amber-500">अ</span>,
        maths: <i data-lucide="calculator" className="w-6 h-6 text-indigo-400"></i>,
        science: <i data-lucide="flask-conical" className="w-6 h-6 text-emerald-400"></i>,
        english: <i data-lucide="languages" className="w-6 h-6 text-sky-400"></i>,
        computer: <i data-lucide="cpu" className="w-6 h-6 text-cyan-400"></i>
      };
      return <div className="p-2 bg-white/5 rounded-xl border border-white/10">{map[s] || <span>📚</span>}</div>;
    };

    const MathText = ({ content }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        const parts = content.split(/(\$[^$]+\$)/g);
        ref.current.innerHTML = "";
        parts.forEach(p => {
          const span = document.createElement("span");
          if (p.startsWith("$") && p.endsWith("$")) {
            try { katex.render(p.slice(1, -1), span, { throwOnError: false }); } catch(e) { span.innerText = p; }
          } else {
            if (/[\u0900-\u097F]/.test(p)) span.className = "hindi-text";
            span.innerText = p;
          }
          ref.current.appendChild(span);
        });
        lucide.createIcons();
      }, [content]);
      return <div ref={ref} className="text-xl font-medium text-center leading-relaxed"></div>;
    };

    function App() {
      // Using a new storage key to force browser to ignore old caches
      const STORAGE_KEY = "ronin_flashcards_v2_final";
      
      const [cards, setCards] = useState([]);
      const [index, setIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [mode, setMode] = useState('upload'); 
      const [flipped, setFlipped] = useState(false);
      const [isShuffle, setIsShuffle] = useState(false);
      const [text, setText] = useState("");

      useEffect(() => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { setCards(JSON.parse(saved)); setMode('study'); }
        lucide.createIcons();
      }, []);

      const startLearning = (input) => {
        const lines = input.split("\n").map(l => l.trim()).filter(Boolean);
        let deck = [];
        for (let i = 0; i < lines.length; i += 2) {
          if (!lines[i+1]) continue;
          let q = lines[i].replace(/^Q:\s*/i, "");
          let a = lines[i+1].replace(/^A:\s*/i, "");
          const d = (q.match(/\[(Easy|Medium|Difficult)\]/i) || ["", "Medium"])[1];
          const s = (q.match(/\[Icon:\s*(.*?)\]/i) || ["", "science"])[1];
          deck.push({ q: q.replace(/\[.*?\]/g, "").trim(), a, d, s });
        }
        
        if (isShuffle) deck = deck.sort(() => Math.random() - 0.5);
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(deck));
        setCards(deck);
        setMode('study');
      };

      const fullReset = () => {
        localStorage.removeItem(STORAGE_KEY);
        window.location.reload(); // Force browser refresh to clear memory
      };

      if (mode === 'upload') return (
        <div className="max-w-xl mx-auto min-h-screen flex flex-col items-center justify-center p-6">
          <div className="w-12 h-12 bg-indigo-600 rounded-xl mb-4 flex items-center justify-center shadow-lg"><i data-lucide="zap"></i></div>
          <h1 className="text-3xl font-bold mb-8">Flashcard Studio</h1>
          
          <div className="w-full flex justify-between mb-4 px-2">
             <label className="text-xs font-bold text-slate-500 uppercase tracking-widest">Bulk Paste Content</label>
             <button onClick={() => setIsShuffle(!isShuffle)} className={`text-[10px] font-bold px-3 py-1 rounded-full border transition-all ${isShuffle ? 'bg-indigo-600 border-indigo-500' : 'border-slate-700 text-slate-500'}`}>
                {isShuffle ? 'SHUFFLE: ON' : 'SEQUENTIAL: ON'}
             </button>
          </div>

          <textarea className="w-full h-64 p-5 bg-[#0d1424] border border-white/5 rounded-2xl text-xs font-mono mb-6 focus:border-indigo-500 outline-none transition-all" 
            placeholder="Q: Question [Easy] [Icon: Hindi]&#10;A: Answer"
            value={text} onChange={e => setText(e.target.value)} />

          <div className="w-full flex gap-3">
            <input type="file" id="fileIn" className="hidden" accept=".md,.txt" onChange={(e) => {
              const reader = new FileReader();
              reader.onload = (ev) => startLearning(ev.target.result);
              reader.readAsText(e.target.files[0]);
            }} />
            <button onClick={() => document.getElementById('fileIn').click()} className="flex-1 py-4 btn-glass rounded-2xl font-bold text-sm">Upload .md</button>
            <button onClick={() => startLearning(text)} className="flex-[2] py-4 bg-indigo-600 rounded-2xl font-bold text-sm shadow-xl">Start Session</button>
          </div>
        </div>
      );

      if (mode === 'finish') return (
        <div className="flex flex-col items-center justify-center min-h-screen text-center p-6">
          <h1 className="text-6xl font-bold mb-4">{score} <span className="text-2xl text-slate-500">Pts</span></h1>
          <p className="text-slate-400 mb-12 uppercase text-xs tracking-widest">Deck Complete</p>
          <button onClick={fullReset} className="px-10 py-4 bg-indigo-600 rounded-2xl font-bold">Restart Everything</button>
        </div>
      );

      const card = cards[index];
      const borderColor = { Easy: 'border-emerald-500', Medium: 'border-amber-500', Difficult: 'border-rose-500' }[card.d];

      return (
        <div className="max-w-lg mx-auto min-h-screen flex flex-col p-6">
          <header className="flex justify-between items-center mb-12 pt-6">
            <div className="bg-indigo-500/10 px-4 py-1.5 rounded-lg border border-indigo-500/20">
              <span className="text-[10px] font-bold text-slate-500 uppercase mr-3">Score</span>
              <span className="text-xl font-bold text-indigo-400">{score}</span>
            </div>
            <button onClick={fullReset} className="p-2 btn-glass rounded-xl text-rose-500" title="Emergency Reset">
              <i data-lucide="rotate-ccw" className="w-5 h-5"></i>
            </button>
          </header>

          <div className="flex-1 flex flex-col justify-center">
            <div className="card-container" onClick={() => setFlipped(!flipped)}>
              <div className={`card-inner ${flipped ? 'is-flipped' : ''}`}>
                <div className={`card-face border-t-8 ${borderColor}`}>
                  <div className="flex justify-between items-center mb-10">
                    <span className="text-[10px] font-bold text-slate-600 uppercase">Card {index+1}/{cards.length}</span>
                    <SubjectIcon subject={card.s} />
                  </div>
                  <MathText content={card.q} />
                  <p className="text-center text-[9px] text-slate-600 font-bold uppercase tracking-widest mt-auto animate-pulse">Tap to reveal</p>
                </div>
                <div className="card-face card-back border-t-8 border-indigo-500">
                  <div className="flex justify-between items-center mb-10">
                    <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Answer</span>
                    <SubjectIcon subject={card.s} />
                  </div>
                  <MathText content={card.a} />
                </div>
              </div>
            </div>

            <div className={`mt-10 flex gap-4 transition-all duration-300 ${flipped ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
              <button onClick={() => { setFlipped(false); setTimeout(() => index < cards.length - 1 ? setIndex(index + 1) : setMode('finish'), 250); }} className="flex-1 py-4 btn-glass text-slate-400 rounded-2xl font-bold">Incorrect</button>
              <button onClick={() => { setScore(score+2); setFlipped(false); setTimeout(() => index < cards.length - 1 ? setIndex(index + 1) : setMode('finish'), 250); }} className="flex-1 py-4 bg-indigo-600 rounded-2xl font-bold shadow-lg shadow-indigo-500/20">Correct +2</button>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
